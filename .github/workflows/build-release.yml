name: Build and Release Android App

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Version tag (VD: v1.0.1)'
        required: true
        default: 'v1.0.1'

permissions:
  contents: write

jobs:
  build:
    name: Build Signed APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode Keystore
        run: base64 -d -i debug.keystore.base64 > app/debug.keystore

      - name: Build Release APK
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_FILE: "debug.keystore"
          KEYSTORE_PASSWORD: "android"
          KEY_ALIAS: "androiddebugkey"
          KEY_PASSWORD: "android"

      - name: Set Release Name
        id: release_name
        run: |
          if [[ "${{ github.event_name }}" == 'workflow_dispatch' ]]; then
            echo "VERSION=${{ github.event.inputs.version_tag }}" >> $GITHUB_ENV
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "VERSION=${{ github.ref_name }}" >> $GITHUB_ENV
          else
            echo "VERSION=v1.0.${{ github.run_number }}" >> $GITHUB_ENV
          fi

      - name: Upload Release APK
        uses: softprops/action-gh-release@v1
        with:
          files: app/build/outputs/apk/release/app-release.apk
          name: Release ${{ env.VERSION }}
          tag_name: ${{ env.VERSION }}
          body: |
            ## 🎉 Tính năng mới và Khắc phục lỗi trong ${{ env.VERSION }}
            
            Vui lòng xem thông tin cập nhật chi tiết ở dưới.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
