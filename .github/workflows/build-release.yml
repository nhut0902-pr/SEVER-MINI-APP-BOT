name: Build and Release Android App

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Version tag (VD: v1.0.1)'
        required: true
        default: 'v1.0.1'

permissions:
  contents: write

jobs:
  build:
    name: Build Signed APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Generate Release Keystore
        run: |
          keytool -genkey -v -keystore app/release.keystore -alias release -keyalg RSA -keysize 2048 -validity 10000 -storepass "nhutcoder123" -keypass "nhutcoder123" -dname "CN=NhutCoder Team, OU=NhutCoder, O=NhutCoder, L=HCM, ST=HCM, C=VN"

      - name: Build Release APK
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_FILE: "release.keystore"
          KEYSTORE_PASSWORD: "nhutcoder123"
          KEY_ALIAS: "release"
          KEY_PASSWORD: "nhutcoder123"

      - name: Upload Release APK
        uses: softprops/action-gh-release@v1
        with:
          files: app/build/outputs/apk/release/app-release.apk
          name: Release ${{ github.event.inputs.version_tag || github.ref_name }}
          tag_name: ${{ github.event.inputs.version_tag || github.ref_name }}
          body: |
            ## 🎉 Tính năng mới và Khắc phục lỗi trong ${{ github.event.inputs.version_tag || github.ref_name }}
            
            Vui lòng xem thông tin cập nhật chi tiết ở dưới.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
