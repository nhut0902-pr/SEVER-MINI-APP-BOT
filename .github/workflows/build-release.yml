name: Build and Release Android App

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Version tag (VD: v1.0.1)'
        required: true
        default: 'v1.0.1'

permissions:
  contents: write

jobs:
  build:
    name: Build Signed APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Fix Gradle Wrapper
        run: gradle wrapper --gradle-version 9.3.1

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Determine Release Name and Version Constants
        id: release_name
        run: |
          if [[ "${{ github.event_name }}" == 'workflow_dispatch' ]]; then
            VERSION_TAG="${{ github.event.inputs.version_tag }}"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION_TAG="${{ github.ref_name }}"
          else
            VERSION_TAG="v1.0.${{ github.run_number }}"
          fi
          
          # Clean 'v' prefix for Gradle versionName (e.g. "1.0.8" instead of "v1.0.8")
          VERSION_CLEAN=$(echo "$VERSION_TAG" | sed 's/^v//')
          
          # Use run_number plus 10 for versionCode
          VERSION_CODE=$(( ${{ github.run_number }} + 10 ))
          
          echo "VERSION=$VERSION_TAG" >> $GITHUB_ENV
          echo "VERSION_CLEAN=$VERSION_CLEAN" >> $GITHUB_ENV
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV

      - name: Build Debug APK with Dynamic Version
        env:
          VERSION_NAME: ${{ env.VERSION_CLEAN }}
          VERSION_CODE: ${{ env.VERSION_CODE }}
        run: ./gradlew assembleDebug

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK
        uses: softprops/action-gh-release@v1
        with:
          files: app/build/outputs/apk/debug/app-debug.apk
          name: Release ${{ env.VERSION }}
          tag_name: ${{ env.VERSION }}
          body: |
            ## 🎉 Tính năng mới và Khắc phục lỗi trong ${{ env.VERSION }}
            
            Vui lòng tải tệp APK bên dưới để cài đặt bản cập nhật mới nhất.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
